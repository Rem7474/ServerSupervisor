# tygo — generates TypeScript interfaces from the Go domain models so the
# frontend types never drift from the server structs. Regenerate with:
#   cd server && go run github.com/gzuidhof/tygo@v0.2.21 generate
# (or `npm run gen:types` from frontend/). See frontend/src/types/README.md.
packages:
  - path: "github.com/serversupervisor/server/internal/models"
    output_path: "../frontend/src/types/generated.ts"
    type_mappings:
      time.Time: "string"
      "json.RawMessage": "unknown"
    frontmatter: |
      /* eslint-disable */
      // Code generated by tygo from server/internal/models. DO NOT EDIT.
      // Regenerate: cd server && go run github.com/gzuidhof/tygo@v0.2.21 generate
