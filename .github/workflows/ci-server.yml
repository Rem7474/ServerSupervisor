name: CI Server

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
      - '.github/workflows/ci-server.yml'
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/ci-server.yml'

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true
          cache-dependency-path: server/go.sum

      # Verify (do NOT auto-commit) that go.mod/go.sum are tidy. Failing here
      # forces the author to commit the fix, so the committed tree is always the
      # source of truth — including on pull requests.
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if [[ -n $(git status --porcelain go.mod go.sum) ]]; then
            echo "::error::go.mod/go.sum are not tidy. Run 'go mod tidy' in server/ and commit the result."
            git --no-pager diff go.mod go.sum
            exit 1
          fi

      # Verify the generated frontend types are in sync with the Go models so the
      # single source of truth (frontend/src/types/generated.ts) can never drift.
      - name: Verify generated frontend types are in sync
        run: |
          go run github.com/gzuidhof/tygo@v0.2.21 generate
          cd ..
          if [[ -n $(git status --porcelain frontend/src/types/generated.ts) ]]; then
            echo "::error::frontend/src/types/generated.ts is out of date. Run 'npm run gen:types' and commit the result."
            git --no-pager diff frontend/src/types/generated.ts
            exit 1
          fi

      - name: Verify Go modules
        run: go mod verify

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        if: always()
        with:
          files: ./server/coverage.out
          flags: server
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      # Blocking lint with a pinned version and a curated, reproducible config
      # (server/.golangci.yml). A regression in code quality now fails CI.
      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: server
          args: --timeout=5m
