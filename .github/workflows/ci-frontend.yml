name: CI Frontend

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'

permissions:
  contents: read

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit & component tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

  # NOTE: the real-browser tests (`npm run test:browser`, Playwright/Chromium) are
  # intentionally NOT run in CI yet. An upstream Vite 8 (rolldown) + Vitest 4
  # browser-mode dep-optimizer bug breaks them (`init_shared_esm_bundler is not
  # defined` at import; or a double Vue instance when worked around). See
  # vitest.browser.config.ts for the full diagnosis. Run them locally with:
  #   cd frontend && npx playwright install --with-deps chromium && npm run test:browser
  # Re-add a `browser-tests` job here once the upstream optimizer bug is fixed.
