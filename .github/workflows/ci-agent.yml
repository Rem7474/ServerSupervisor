name: CI Agent

on:
  push:
    branches: [main, develop]
    paths:
      - 'agent/**'
      - '.github/workflows/ci-agent.yml'
  pull_request:
    paths:
      - 'agent/**'
      - '.github/workflows/ci-agent.yml'

permissions:
  contents: read

concurrency:
  group: ci-agent-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache: true
          cache-dependency-path: agent/go.sum

      # Verify (do NOT auto-commit) that go.mod/go.sum are tidy. Failing here
      # forces the author to commit the fix, so the committed tree is always the
      # source of truth — including on pull requests.
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if [[ -n $(git status --porcelain go.mod go.sum) ]]; then
            echo "::error::go.mod/go.sum are not tidy. Run 'go mod tidy' in agent/ and commit the result."
            git --no-pager diff go.mod go.sum
            exit 1
          fi

      - name: Verify Go modules
        run: go mod verify

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        if: always()
        with:
          files: ./agent/coverage.out
          flags: agent
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      # Blocking lint with a pinned version and a curated, reproducible config
      # (agent/.golangci.yml). A regression in code quality now fails CI.
      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: agent
          args: --timeout=5m --path-mode=abs
